# Configuration for the spacecat.service systemd unit.
# After editing, apply with:  systemctl restart spacecat
#
# The application configuration (telescopes, chat services) lives in
# /etc/spacecat/config.json. These knobs only tune how the systemd unit invokes
# `spacecat chat-updater`.

# Seconds between event/image polls.
SPACECAT_INTERVAL=5

# Extra arguments appended verbatim to `spacecat chat-updater` (split on
# whitespace). Normally empty.
SPACECAT_EXTRA_ARGS=
